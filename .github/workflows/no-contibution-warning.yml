# Add a warning to issue description when issue is labeled "Needs ..."
# and remove it if all such lables are removed
name: "Add or remove no-contribution warning"
 
permissions:
  #contents: read
  issues: write

on:
  issues:
    types: [labeled, unlabeled]
      
env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GH_REPO: ${{ github.repository }}
  ISSUE_NUMBER: ${{ github.event.issue.number }}

jobs:
  add_no_contribution_warning:
    runs-on: ubuntu-latest
    if: github.event.action == 'labeled' && startsWith(github.event.label.name, 'Needs')
    steps:
      - name: Add no-contribution warning
        run: |
          body="$(gh issue view "$ISSUE_NUMBER" --json body --jq .body)"
          
          warning_message='>[!WARNING]
          >This issue is not (yet) open for contribution. If you are looking to contribute, please have a look at our [contributing doc](https://scikit-learn.org/dev/developers/contributing.html) and in particular the section [Issues for new contributors](https://scikit-learn.org/dev/developers/contributing.html#issues-for-new-contributors).'
  
          if [[ "$body" == "${warning_message}"* ]]; then
            exit 0
          fi
          
          new_body="$warning_message
          
          $body"
          
          gh issue edit "$ISSUE_NUMBER" --body "$new_body"


